name: Deploy Senzany to OVH

on:
  push:
    branches:
      - main

concurrency:
  group: senzany-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY_B64 }}" | base64 --decode > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Update Senzany on OVH
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
              set -e
              cd /var/www/senzany
              git pull --ff-only origin main

              mkdir -p /var/www/senzany/server/routes
              cp -f /var/www/senzany/backend/server.js /var/www/senzany/server/server.js
              cp -f /var/www/senzany/backend/package.json /var/www/senzany/server/package.json
              cp -rf /var/www/senzany/backend/routes/. /var/www/senzany/server/routes/

              cd /var/www/senzany/server
              npm install --omit=dev
              pm2 restart senzany-api --update-env || pm2 start server.js --name senzany-api
              pm2 save
            '
