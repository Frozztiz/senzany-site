name: Deploy Senzany to OVH

on:
  push:
    branches:
      - main

concurrency:
  group: senzany-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY_B64 }}" | base64 --decode > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Update Senzany on OVH
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
              set -e

              cd /var/www/senzany

              echo "=== Synchronisation Git ==="
              git fetch origin main
              git reset --hard origin/main
              git clean -fd

              echo "=== Préparation du backend ==="
              mkdir -p /var/www/senzany/server

              cp -f backend/server.js server/server.js
              cp -f backend/package.json server/package.json

              for directory in config controllers middleware routes services utils; do
                if [ -d "backend/$directory" ]; then
                  mkdir -p "server/$directory"
                  cp -rf "backend/$directory/." "server/$directory/"
                fi
              done

              cd /var/www/senzany/server

              echo "=== Installation des dépendances ==="
              npm install --omit=dev

              echo "=== Redémarrage de l API ==="
              pm2 restart senzany-api --update-env || pm2 start server.js --name senzany-api
              pm2 save

              echo "=== Vérification de l API ==="
              sleep 4

              if curl --fail --silent --show-error http://127.0.0.1:3000/api/health; then
                echo ""
                echo "API Senzany opérationnelle."
              else
                echo ""
                echo "ERREUR : l API ne répond pas sur le port 3000."
                echo "=== État PM2 ==="
                pm2 status
                echo "=== Informations du processus ==="
                pm2 describe senzany-api || true
                echo "=== Derniers logs ==="
                pm2 logs senzany-api --lines 100 --nostream || true
                exit 1
              fi
            '
